name: CI

on:
  push:
    branches: [ main, development ]
  pull_request:
    branches: [ main, development ]
    types: [ opened, synchronize, reopened, ready_for_review ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Single combined job for faster execution
  test-and-lint:
    name: Test & Lint
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft != true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: make test

      - name: Generate coverage report
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.out
          flags: unittests
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

      - name: Run go vet
        run: go vet ./...

  # Only build Linux AMD64 on PRs to development
  build-quick:
    name: Quick Build
    needs: test-and-lint
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft != true && github.base_ref == 'development'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build Linux AMD64
        run: |
          go build -o dbz-linux-amd64 main.go
          chmod +x dbz-linux-amd64
          ./dbz-linux-amd64 --version

  # Full cross-platform build only on PRs to main
  build-all:
    name: Build All Platforms
    needs: test-and-lint
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft != true && github.base_ref == 'main'
    strategy:
      fail-fast: true
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          OUTPUT_NAME=dbz-${{ matrix.goos }}-${{ matrix.goarch }}
          if [ "${{ matrix.goos }}" = "windows" ]; then
            OUTPUT_NAME="${OUTPUT_NAME}.exe"
          fi
          go build -o $OUTPUT_NAME main.go

      - name: Test binary (Linux AMD64 only)
        if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
        run: |
          chmod +x dbz-linux-amd64
          ./dbz-linux-amd64 --version

  # Integration tests - only on ready PRs to main
  integration:
    name: Integration Tests
    needs: test-and-lint
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft != true && github.base_ref == 'main'
    services:
      docker:
        image: docker:24-dind
        options: --privileged
        ports:
          - 2375:2375
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build binary
        run: make build

      - name: Test Docker integration
        env:
          DOCKER_HOST: tcp://localhost:2375
        run: |
          ./dbz --version
          ./dbz list || echo "No containers expected initially"
          # Add more integration tests here
